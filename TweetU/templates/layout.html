{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">

    <!-- Static CSS -->
    <link href="{% static 'css/style.css' %}" rel="stylesheet">

    <title>{% block title %} TweetUp {% endblock %}</title>

    <style>
        body {
            font-family: system-ui;
        }

        .navbar-brand {
            font-weight: 600;
        }

        .nav-btn {
            margin-left: 8px;
        }

        .search-input {
            max-width: 250px;
        }

        .theme-toggle {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-right: 10px;
        }
    </style>
</head>

<body>

<!-- ✅ NAVBAR -->
<nav class="navbar navbar-expand-lg bg-body-tertiary shadow-sm">
    <div class="container-fluid">

        <!-- Logo -->
        <a class="navbar-brand" href="{% url 'tweet_list' %}">🐦 TweetUp</a>

        <!-- Toggle button -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Navbar content -->
        <div class="collapse navbar-collapse justify-content-between" id="navbarContent">

            <!-- Left side -->
            <div></div>

            <!-- Center Search -->
            <form class="d-flex" method="get" action="{% url 'search' %}">
                <input 
                    class="form-control me-2 search-input" 
                    type="search" 
                    name="q" 
                    placeholder="Search tweets..." 
                    value="{{ request.GET.q|default_if_none:'' }}"
                >
                <button class="btn btn-outline-success">Search</button>
            </form>

            <!-- Right side -->
            <div class="d-flex align-items-center">

                <!-- 🌙 Dark Mode Toggle -->
                <div class="theme-toggle" id="modeToggle">
                    <i class="fas fa-moon"></i>
                    <div class="form-check form-switch m-0">
                        <input class="form-check-input" type="checkbox" id="themeSwitch">
                    </div>
                    <i class="fas fa-sun"></i>
                </div>

                <!-- Auth Buttons -->
                {% if user.is_authenticated %}
                    <a href="{% url 'tweet_list' %}" class="btn btn-outline-primary nav-btn">Home</a>

                    <form method="post" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button class="btn btn-outline-danger nav-btn">Logout</button>
                    </form>
                {% else %}
                    <a href="{% url 'register' %}" class="btn btn-outline-info nav-btn">Register</a>
                    <a href="{% url 'login' %}" class="btn btn-outline-success nav-btn">Login</a>
                {% endif %}

            </div>
        </div>
    </div>
</nav>

<!-- ✅ MAIN CONTENT -->
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- 🌙 Dark Mode Script -->
<script>
    const switchBtn = document.getElementById("themeSwitch");

    // Load saved theme
    if (localStorage.getItem("theme") === "light") {
        document.documentElement.setAttribute("data-bs-theme", "light");
        switchBtn.checked = true;
    }

    // Toggle theme
    document.getElementById("modeToggle").addEventListener("click", () => {
        const current = document.documentElement.getAttribute("data-bs-theme");
        const newTheme = current === "dark" ? "light" : "dark";

        document.documentElement.setAttribute("data-bs-theme", newTheme);
        localStorage.setItem("theme", newTheme);

        switchBtn.checked = newTheme === "light";
    });
</script>

</body>
</html>
