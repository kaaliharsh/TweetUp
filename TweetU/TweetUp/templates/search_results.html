{% extends "layout.html" %}

{% block content %}
<style>
    .result-card {
        width: 500px;
        border-radius: 12px;
    }

    .tweet-card {
        border: 1px solid #e6e6e6;
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 12px;
        transition: 0.2s;
    }

    .tweet-card:hover {
        background-color: #f8f9fa;
    }

    .tweet-text {
        font-size: 15px;
        margin-bottom: 8px;
    }

    .tweet-link {
        text-decoration: none;
        color: #0d6efd;
        font-size: 14px;
    }

    .tweet-link:hover {
        text-decoration: underline;
    }
</style>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">

    <div class="card shadow-lg p-4 result-card">

        <h4 class="text-center mb-3">Search 🔍</h4>

        <!-- Search Bar -->
        <form method="GET" class="d-flex mb-3">
            <input 
                type="text" 
                name="q" 
                class="form-control me-2" 
                placeholder="Search tweets..." 
                value="{{ query|default:'' }}"
                required
            >
            <button class="btn btn-primary">Search</button>
        </form>

        {% if query %}
            <p class="text-muted text-center">
                Showing results for: <strong>{{ query }}</strong>
            </p>
        {% endif %}

        {% if results %}
            <div class="mt-3">
                {% for result in results %}
                    <div class="tweet-card">
                        
                        <div class="tweet-text">
                            {{ result.text }}
                        </div>

                        <a href="{{ result.get_absolute_url }}" class="tweet-link">
                            View Tweet →
                        </a>

                    </div>
                {% endfor %}
            </div>
        {% else %}
            <p class="text-center mt-3 text-muted">No results found.</p>
        {% endif %}

    </div>

</div>
{% endblock %}
