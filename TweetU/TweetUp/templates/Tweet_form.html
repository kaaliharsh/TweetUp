{% extends 'layout.html' %}

{% block title %} TweetUp {% endblock %}

{% block content %}
<style>
    .form-card {
        width: 500px;
        border-radius: 12px;
    }
</style>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">

    <div class="card shadow-lg p-4 form-card">
        <h5 class="text-center mb-4">
            {% if form.instance.pk %} Edit Tweet ✏️ {% else %} Create Tweet {% endif %}
        </h5>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- Form Fields -->
            <div class="mb-3">
                {{ form.as_p }}
            </div>

            <!-- Submit Button -->
            <button class="btn btn-warning w-100" type="submit">Submit</button>
        </form>

        <!-- Back Link -->
        <p class="text-center mt-3 mb-0">
            <a href="{% url 'tweet_list' %}" class="text-decoration-none">
                ← Back to Tweets
            </a>
        </p>

    </div>

</div>
{% endblock %}
